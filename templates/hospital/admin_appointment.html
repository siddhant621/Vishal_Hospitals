{% extends 'hospital/admin_base.html' %}
{% load static %}
{% block content %}

<head>
  <!-- Add Tailwind CDN if not already in base -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<br><br>

<div class="max-w-6xl mx-auto px-6">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- View Appointment -->
    <a href="/admin-view-appointment" 
       class="block bg-gradient-to-r from-blue-500 to-sky-400 text-white rounded-2xl shadow-lg p-6 transform hover:scale-105 transition duration-300">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-xl font-semibold mb-1">View Appointment</h2>
          <p class="text-sm text-blue-100">Check scheduled appointments</p>
        </div>
        <div class="text-4xl opacity-80">
          <i class="fas fa-calendar"></i>
        </div>
      </div>
    </a>

    <!-- Book Appointment -->
    <a href="/admin-add-appointment" 
       class="block bg-gradient-to-r from-emerald-500 to-teal-400 text-white rounded-2xl shadow-lg p-6 transform hover:scale-105 transition duration-300">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-xl font-semibold mb-1">Book Appointment</h2>
          <p class="text-sm text-emerald-100">Create a new appointment</p>
        </div>
        <div class="text-4xl opacity-80">
          <i class="fas fa-book-medical"></i>
        </div>
      </div>
    </a>

    <!-- Approve Appointment -->
    <a href="/admin-approve-appointment" 
       class="block bg-gradient-to-r from-amber-400 to-yellow-300 text-white rounded-2xl shadow-lg p-6 transform hover:scale-105 transition duration-300">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-xl font-semibold mb-1">Approve Appointment</h2>
          <p class="text-sm text-amber-100">Review and approve pending ones</p>
        </div>
        <div class="text-4xl opacity-80">
          <i class="fas fa-check-circle"></i>
        </div>
      </div>
    </a>

  </div>
</div>

<!-- Optional: Font Awesome for icons -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<br><br><br><br><br><br><br>
{% endblock content %}
