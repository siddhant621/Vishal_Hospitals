{% extends 'hospital/admin_base.html' %}
{% load static %}
{% block content %}

<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center py-10 px-4">

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 w-full max-w-6xl">

    <!-- Doctor Record -->
    <a href="/admin-view-doctor"
       class="bg-gradient-to-r from-blue-500 to-blue-400 text-white rounded-2xl shadow-lg hover:shadow-xl transition-transform transform hover:scale-105 p-6">
      <div class="flex justify-between items-center">
        <div>
          <h6 class="text-lg font-semibold">Doctor Record</h6>
        </div>
        <i class="fas fa-user-nurse text-3xl"></i>
      </div>
    </a>

    <!-- Register Doctor -->
    <a href="/admin-add-doctor"
       class="bg-gradient-to-r from-emerald-500 to-teal-400 text-white rounded-2xl shadow-lg hover:shadow-xl transition-transform transform hover:scale-105 p-6">
      <div class="flex justify-between items-center">
        <div>
          <h6 class="text-lg font-semibold">Register Doctor</h6>
        </div>
        <i class="fas fa-user-plus text-3xl"></i>
      </div>
    </a>

    <!-- Approve Doctor -->
    <a href="/admin-approve-doctor"
       class="bg-gradient-to-r from-yellow-400 to-amber-300 text-white rounded-2xl shadow-lg hover:shadow-xl transition-transform transform hover:scale-105 p-6">
      <div class="flex justify-between items-center">
        <div>
          <h6 class="text-lg font-semibold">Approve Doctor</h6>
        </div>
        <i class="fas fa-check-circle text-3xl"></i>
      </div>
    </a>

    <!-- Doctor Specialisation -->
    <a href="/admin-view-doctor-specialisation"
       class="bg-gradient-to-r from-pink-500 to-rose-400 text-white rounded-2xl shadow-lg hover:shadow-xl transition-transform transform hover:scale-105 p-6">
      <div class="flex justify-between items-center">
        <div>
          <h6 class="text-lg font-semibold">Doctor Specialisation</h6>
        </div>
        <i class="fas fa-user-md text-3xl"></i>
      </div>
    </a>

  </div>

</div>

{% endblock content %}
