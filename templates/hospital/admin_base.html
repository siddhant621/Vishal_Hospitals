<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Vishal || Jayant</title>

  <!-- ✅ Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Font Awesome (optional, for social icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- ✅ Custom Styles (optional overrides) -->
  <link rel="stylesheet" href="{% static '/style.css' %}">
</head>

<body class="flex min-h-screen bg-gray-100 text-gray-900">

  <!-- Sidebar -->
  <aside class="w-64 bg-green-500 text-white flex flex-col fixed top-0 left-0 h-screen shadow-lg">
    <div class="flex flex-col items-center py-8 bg-green-600">
      <img src="{% static 'images/adminpropic.png' %}" alt="Admin" class="w-24 h-24 rounded-full border-4 border-yellow-300">
      <h6 class="text-white mt-3 text-sm">Admin</h6>
      <h2 class="text-xl font-semibold">{{ request.user.first_name }}</h2>
    </div>

    <nav class="flex-1 mt-6 space-y-1">
      <a href="/admin-dashboard" class="block px-6 py-3 hover:bg-green-600 transition">
        <i class="fa-solid fa-gauge mr-2"></i> Dashboard
      </a>
      <a href="/admin-doctor" class="block px-6 py-3 hover:bg-green-600 transition">
        <i class="fa-solid fa-user-md mr-2"></i> Doctor
      </a>
      <a href="/admin-patient" class="block px-6 py-3 hover:bg-green-600 transition">
        <i class="fa-solid fa-hospital-user mr-2"></i> Patient
      </a>
      <a href="/admin-appointment" class="block px-6 py-3 hover:bg-green-600 transition">
        <i class="fa-solid fa-calendar-check mr-2"></i> Appointment
      </a>
    </nav>

    <div class="p-6 mt-auto">
      <a href="/logout" class="w-full bg-red-600 text-white py-2 px-4 rounded-md text-center block hover:bg-red-700 transition">
        Logout
      </a>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="flex-1 ml-64">

    <!-- Top Navbar -->
    <header class="bg-blue-600 text-white py-4 px-6 shadow-md flex justify-between items-center sticky top-0 z-10">
      <h1 class="text-lg font-semibold">Vishal Multispeciality Hospital</h1>
      <a href="/logout" class="text-white bg-red-500 px-4 py-2 rounded-md hover:bg-red-600 transition">Logout</a>
    </header>

    <!-- Content -->
    <section class="p-8">
      {% block content %}
      {% endblock content %}
    </section>

    <!-- Footer -->
    <footer class="bg-black text-center text-white py-6">
      <div class="flex justify-center space-x-4 mb-4">
        <a href="#" class="fa-brands fa-facebook-f bg-blue-600 p-3 rounded-full hover:opacity-80"></a>
        <a href="#" class="fa-brands fa-whatsapp bg-green-500 p-3 rounded-full hover:opacity-80"></a>
        <a href="#" class="fa-brands fa-instagram bg-pink-600 p-3 rounded-full hover:opacity-80"></a>
        <a href="#" class="fa-brands fa-twitter bg-sky-500 p-3 rounded-full hover:opacity-80"></a>
      </div>
      <p class="text-gray-400 text-sm">All rights reserved<br>© 2025 Siddhant Singh Saini</p>
    </footer>

  </main>

</body>
</html>
