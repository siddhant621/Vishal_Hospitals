{% extends 'hospital/admin_base.html' %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex justify-center py-10 px-4">
  <div class="w-full max-w-5xl bg-white shadow-lg rounded-2xl p-6">
    
    <!-- Header -->
    <div class="text-center mb-6">
      <h2 class="text-2xl font-semibold text-gray-700">Department & Doctors</h2>
      <div class="w-20 h-1 bg-blue-500 mx-auto mt-2 rounded-full"></div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto rounded-lg shadow-sm">
      <table class="min-w-full border border-gray-200">
        <thead class="bg-blue-500 text-white">
          <tr>
            <th class="py-3 px-4 text-left text-sm font-semibold">Department</th>
            <th class="py-3 px-4 text-left text-sm font-semibold">Doctor Name</th>
            <th class="py-3 px-4 text-left text-sm font-semibold">Mobile</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          {% for d in doctors %}
          <tr class="hover:bg-blue-50 transition duration-200">
            <td class="py-3 px-4 text-gray-700">{{ d.department }}</td>
            <td class="py-3 px-4 text-gray-700">{{ d.get_name }}</td>
            <td class="py-3 px-4 text-gray-700">{{ d.mobile }}</td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3" class="py-6 text-center text-gray-500">No doctors found.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock content %}
