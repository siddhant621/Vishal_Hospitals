<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vishal || Jayant</title>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
  {% include "hospital/navbar.html" %}

  <main class="flex-grow flex items-center justify-center mt-8">
    <div class="bg-white shadow-lg rounded-xl p-10 max-w-2xl text-center">
      <h1 class="text-3xl font-bold text-gray-800 mb-4">
        Hello {{ request.user.first_name }}
      </h1>

      <p class="text-gray-600 leading-relaxed mb-6">
        Your account has not been approved yet.<br><br>
        Our team is reviewing your profile.<br><br>
        Soon your account will be confirmed.
      </p>

      <hr class="border-gray-200 mb-6">

      <p class="text-gray-500 mb-4">Please check back later.</p>

      <a 
        href="/logout"
        class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg text-lg font-medium hover:bg-blue-700 transition"
      >
        Logout For Now
      </a>
    </div>
  </main>

  {% include "hospital/footer.html" %}
