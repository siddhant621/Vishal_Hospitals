<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Vishal || Jayant</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    a:link, a:visited {
      text-decoration: none;
      color: white;
    }
    a:hover {
      color: white;
    }

    body {
      padding-left: 240px;
    }

    main {
      position: relative;
      min-height: 100vh;
    }

    /* Sidebar */
    .menu {
      background: #5bc995;
      height: 100vh;
      width: 240px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 50;
      outline: none;
    }

    .menu .avatar img {
      width: 100px;
      border-radius: 50%;
      border: 4px solid #ffea92;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2);
    }

    .menu ul li:hover {
      background-color: rgba(0, 0, 0, 0.1);
    }

    footer {
      background-color: black;
      padding: 1rem 0;
    }

    footer .fa {
      font-size: 1.4rem;
      width: 3.5rem;
      height: 3.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin: 0.25rem;
    }

    .fa-facebook { background: #3B5998; }
    .fa-whatsapp { background: #25d366; }
    .fa-twitter { background: #55ACEE; }
    .fa-instagram { background: #125688; }
  </style>
</head>

<body class="bg-gray-100">
  <!-- Sidebar -->
  <nav class="menu flex flex-col items-center p-4" tabindex="0">
    <header class="avatar text-center mb-6">
      <img src="{% static patient.profile_pic.url %}" alt="Profile Pic">
      <h6 class="mt-2">Patient</h6>
      <h2 class="text-xl font-semibold">{{request.user.first_name}}</h2>
    </header>
    <ul class="w-full space-y-2">
      <li class="px-4 py-2 hover:bg-black/10"><a href="/patient-dashboard"><span>Dashboard</span></a></li>
      <li class="px-4 py-2 hover:bg-black/10"><a href="/patient-appointment"><span>Appointments</span></a></li>
      <li class="px-4 py-2 hover:bg-black/10"><a href="/patient-view-doctor"><span>Doctors</span></a></li>
      <li class="px-4 py-2 hover:bg-black/10"><a href="/patient-discharge"><span>Discharge</span></a></li>
    </ul>
  </nav>

  <main class="ml-[240px]">
    <!-- Navbar -->
    <nav class="fixed top-0 left-[240px] right-0 bg-blue-700 text-white flex justify-between items-center px-4 h-14 z-40">
      <a href="/patient-dashboard" class="font-bold">HOSPITAL MANAGEMENT</a>
      <div>
        <a href="/logout" class="px-4 py-2 hover:bg-blue-600 rounded">Logout</a>
      </div>
    </nav>

    <div class="mt-14 p-4">
      {% block content %}
      {% endblock content %}
    </div>

    <!-- Footer -->
    <footer class="mt-10 text-center text-white">
      <div class="mb-4">
        <a href="https://facebook.com/sumit.luv/" class="fa fa-facebook"></a>
        <a href="https://api.whatsapp.com/send?phone=919572181024" class="fa fa-whatsapp"></a>
        <a href="https://instagram.com/sumit.luv" class="fa fa-instagram"></a>
        <a href="https://twitter.com/sumitkumar1503" class="fa fa-twitter"></a>
      </div>
      <p>Made in India <br> Copyright &copy; 2020 LazyCoder</p>
    </footer>
  </main>
</body>

</html>
