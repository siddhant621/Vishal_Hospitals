<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Role Selection</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 p-6 max-w-6xl mx-auto">
    
    <!-- ADMIN Card -->
    <div class="bg-white shadow-lg rounded-2xl overflow-hidden transform hover:scale-105 transition duration-300">
      <img src="{% static 'images/admin.png' %}" alt="Admin" class="w-full h-60 object-cover">
      <div class="p-6 text-center">
        <p class="text-gray-500 text-lg font-semibold mb-4">ADMIN</p>
        <a href="/adminclick"
           class="inline-block w-full bg-blue-600 text-white font-medium py-2 rounded-lg hover:bg-blue-700 transition">
          View
        </a>
      </div>
    </div>

    <!-- DOCTOR Card -->
    <div class="bg-white shadow-lg rounded-2xl overflow-hidden transform hover:scale-105 transition duration-300">
      <img src="{% static 'images/doctor.png' %}" alt="Doctor" class="w-full h-60 object-cover">
      <div class="p-6 text-center">
        <p class="text-gray-500 text-lg font-semibold mb-4">DOCTOR</p>
        <a href="/doctorclick"
           class="inline-block w-full bg-green-600 text-white font-medium py-2 rounded-lg hover:bg-green-700 transition">
          View
        </a>
      </div>
    </div>

    <!-- PATIENT Card -->
    <div class="bg-white shadow-lg rounded-2xl overflow-hidden transform hover:scale-105 transition duration-300">
      <img src="{% static 'images/patient.jpg' %}" alt="Patient" class="w-full h-60 object-cover">
      <div class="p-6 text-center">
        <p class="text-gray-500 text-lg font-semibold mb-4">PATIENT</p>
        <a href="/patientclick"
           class="inline-block w-full bg-purple-600 text-white font-medium py-2 rounded-lg hover:bg-purple-700 transition">
          View
        </a>
      </div>
    </div>

  </div>

</body>

</html>
