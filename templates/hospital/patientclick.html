{% extends 'hospital/homebase.html' %}

{% block content %}

<div class="bg-gray-50 min-h-screen flex flex-col justify-center items-center py-16">
  <div class="bg-white rounded-lg shadow-lg p-10 text-center max-w-3xl">
    <h1 class="text-5xl font-bold mb-4">Hello, there</h1>
    <p class="text-xl mb-6 text-gray-700">Welcome to Vishal Multispeciality Hospital</p>
    <hr class="border-gray-300 my-6">
    <p class="mb-8 text-gray-600">You can access various features after Login/SignUp.</p>
    <div class="flex flex-col sm:flex-row justify-center gap-4">
      <a href="{% url 'patientsignup' %}" 
         class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">
         Register Your Account
      </a>
      <a href="{% url 'patientlogin' %}" 
         class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition">
         Login
      </a>
    </div>
  </div>
</div>

{% endblock %}
