{% extends 'hospital/homebase.html' %}
{% load static %}

{% block content %}
<head>
  <style>
    .jumbotron {
      margin: 0;
      background-image: url('{% static "images/bg.jpg" %}');
      background-size: cover;
      background-repeat: no-repeat;
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    .glow {
      font-size: 48px;
      color: white;
      text-align: center;
      animation: glow 1s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #eeeeee, 0 0 20px #000, 0 0 30px #000, 0 0 40px #000, 0 0 50px #9554b3, 0 0 60px #9554b3, 0 0 70px #9554b3;
      }
      to {
        text-shadow: 0 0 20px #eeeeee, 0 0 30px #ff4da6, 0 0 40px #ff4da6, 0 0 50px #ff4da6, 0 0 60px #ff4da6, 0 0 70px #ff4da6, 0 0 80px #ff4da6;
      }
    }

    h3 {
      margin-top: 20px;
      color: white;
    }

    .btn-primary {
      background-color: #007bff;
      border: none;
      padding: 12px 28px;
      border-radius: 25px;
      font-size: 18px;
    }

    .btn-primary:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<div class="jumbotron">
  <h5 class="display-3 glow">You’ll Love the Way We Care for You</h5>
  <br><br><br><br>
  <h3>Emergency?</h3>
  <p class="lead">
    <a class="btn btn-primary btn-lg" href="/patientclick" role="button">Take Appointment</a>
  </p>
</div>

<br><br><br>
{% include "hospital/admin_doctor_patient_card.html" %}
<br><br><br>
{% endblock content %}
