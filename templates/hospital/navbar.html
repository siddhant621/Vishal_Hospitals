<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Vishal Multispeciality Hospital</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 w-full bg-[#337AB7] text-white shadow-md z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">

        <!-- Brand -->
        <a href="/" class="text-lg font-semibold tracking-wide">
          Vishal Multispeciality Hospital
        </a>

        <!-- Mobile menu button -->
        <button id="menu-btn" class="block md:hidden focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" 
               viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <!-- Menu Links -->
        <div id="menu" class="hidden md:flex md:items-center md:space-x-6">
          <div class="flex space-x-6">
            <a href="/adminclick" class="hover:text-yellow-300 transition">Admin</a>
            <a href="/doctorclick" class="hover:text-yellow-300 transition">Doctor</a>
            <a href="/patientclick" class="hover:text-yellow-300 transition">Patient</a>
          </div>
          <div class="flex space-x-6 ml-8">
            <a href="/aboutus" class="hover:text-yellow-300 transition">About Us</a>
            <a href="/contactus" class="hover:text-yellow-300 transition">Contact Us</a>
          </div>
        </div>

      </div>
    </div>

    <!-- Mobile Dropdown -->
    <div id="mobile-menu" class="md:hidden hidden bg-[#337AB7] text-white">
      <a href="/adminclick" class="block px-4 py-2 hover:bg-blue-600">Admin</a>
      <a href="/doctorclick" class="block px-4 py-2 hover:bg-blue-600">Doctor</a>
      <a href="/patientclick" class="block px-4 py-2 hover:bg-blue-600">Patient</a>
      <a href="/aboutus" class="block px-4 py-2 hover:bg-blue-600">About Us</a>
      <a href="/contactus" class="block px-4 py-2 hover:bg-blue-600">Contact Us</a>
    </div>
  </nav>

  <script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });
  </script>

  <!-- Spacer so content doesn’t hide behind navbar -->
  <div class="h-16"></div>

</body>
</html>
