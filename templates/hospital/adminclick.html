{% extends 'hospital/homebase.html' %}
{% block content %}

<div class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-gray-50 to-blue-100 px-6 py-12">
  
  <div class="bg-white rounded-2xl shadow-lg p-10 max-w-2xl w-full text-center border border-gray-200">
    <h1 class="text-4xl font-semibold text-gray-800 mb-4">Hello, Admin</h1>
    <p class="text-gray-600 text-lg mb-2">Welcome to Vishal Hospital.</p>
    <hr class="my-6 border-gray-300 w-1/2 mx-auto">
    <p class="text-gray-500 mb-6">You can access various features after logging in or signing up.</p>

    <div class="flex justify-center space-x-6">
      <a href="/adminsignup" 
         class="px-6 py-2 text-white bg-blue-600 rounded-lg shadow-md hover:bg-blue-700 transition duration-200">
        Sign Up
      </a>
      <a href="/adminlogin" 
         class="px-6 py-2 text-white bg-green-600 rounded-lg shadow-md hover:bg-green-700 transition duration-200">
        Log In
      </a>
    </div>
  </div>

</div>

{% endblock content %}
