{% extends 'hospital/patient_base.html' %}
{% load static %}
{% block content %}
<br><br>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css" rel="stylesheet">

  <style type="text/css">
    a:link {
      text-decoration: none;
    }

    h6 {
      color: white;
    }

    .bg-c-blue {
      background: linear-gradient(45deg, #4099ff, #73b4ff);
    }

    .bg-c-green {
      background: linear-gradient(45deg, #2ed8b6, #59e0c5);
    }

    .card-custom {
      border-radius: 0.5rem;
      box-shadow: 0 1px 3px rgba(4, 26, 55, 0.16);
      transition: all 0.3s ease-in-out;
    }

    .order-card i {
      font-size: 1.625rem; /* 26px */
    }
  </style>
</head>

<div class="container mx-auto px-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- View Appointment Card -->
    <div>
      <div class="card-custom bg-c-blue text-white p-6 order-card">
        <a href="/patient-view-appointment">
          <h6 class="mb-4 text-lg font-semibold">View Your Appointment</h6>
        </a>
        <div class="flex items-center justify-between">
          <h2><i class="fas fa-calendar"></i></h2>
        </div>
      </div>
    </div>

    <!-- Book Appointment Card -->
    <div>
      <div class="card-custom bg-c-green text-white p-6 order-card">
        <a href="/patient-book-appointment">
          <h6 class="mb-4 text-lg font-semibold">Book Appointment</h6>
        </a>
        <div class="flex items-center justify-between">
          <h2><i class="fas fa-book-medical"></i></h2>
        </div>
      </div>
    </div>
  </div>
</div>

<br><br><br><br><br><br><br><br>
{% endblock content %}
