<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vishal || Jayant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="flex bg-gray-100 text-gray-900">

  <!-- Sidebar -->
  <nav class="w-64 bg-green-500 text-white flex flex-col h-screen fixed top-0 left-0 shadow-lg">
    <div class="flex flex-col items-center py-6 border-b border-green-400">
      <img src="{% static doctor.profile_pic.url %}" alt="Profile Pic" class="w-24 h-24 rounded-full border-4 border-yellow-300 shadow-md">
      <h6 class="mt-3 text-sm uppercase tracking-wide opacity-80">Doctor</h6>
      <h2 class="text-lg font-semibold">{{ request.user.first_name }}</h2>
    </div>

    <ul class="flex-1 py-6 space-y-2">
      <li>
        <a href="/doctor-dashboard" class="flex items-center px-6 py-3 hover:bg-green-600 transition rounded-md">
          <i class="fa-solid fa-gauge mr-3"></i> Dashboard
        </a>
      </li>
      <li>
        <a href="/doctor-patient" class="flex items-center px-6 py-3 hover:bg-green-600 transition rounded-md">
          <i class="fa-solid fa-user-group mr-3"></i> Patients
        </a>
      </li>
      <li>
        <a href="/doctor-appointment" class="flex items-center px-6 py-3 hover:bg-green-600 transition rounded-md">
          <i class="fa-solid fa-calendar-check mr-3"></i> Appointments
        </a>
      </li>
    </ul>

    <div class="border-t border-green-400 py-4 text-center">
      <a href="/logout" class="text-white hover:text-gray-200 font-medium">
        <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="ml-64 flex-1 flex flex-col min-h-screen">
    <!-- Navbar -->
    <header class="bg-blue-600 text-white flex justify-between items-center px-8 py-4 shadow-md">
      <h1 class="text-xl font-semibold tracking-wide">Hospital Management</h1>
      <a href="/logout" class="bg-white text-blue-600 px-4 py-2 rounded-md font-medium hover:bg-blue-100 transition">
        Logout
      </a>
    </header>

    <!-- Dynamic Content Block -->
    <section class="flex-1 p-8">
      {% block content %}
      {% endblock content %}
    </section>

    <!-- Footer -->
    <footer class="bg-black text-gray-300 text-center py-6">
      <div class="flex justify-center gap-6 mb-3">
        <a href="https://facebook.com/sumit.luv/" class="fa fa-facebook-f bg-blue-600 p-3 rounded-full hover:opacity-80"></a>
        <a href="https://api.whatsapp.com/send?phone=919572181024" class="fa fa-whatsapp bg-green-500 p-3 rounded-full hover:opacity-80"></a>
        <a href="https://instagram.com/sumit.luv" class="fa fa-instagram bg-pink-600 p-3 rounded-full hover:opacity-80"></a>
        <a href="https://twitter.com/sumitkumar1503" class="fa fa-twitter bg-sky-500 p-3 rounded-full hover:opacity-80"></a>
      </div>
      <p>Made in India <br> Copyright © 2025 Vishal & Jayant</p>
    </footer>
  </main>
</body>
</html>
