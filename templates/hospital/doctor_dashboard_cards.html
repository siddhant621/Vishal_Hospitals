<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Doctor Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <div class="flex flex-col md:flex-row gap-6 p-6">
    
    <!-- Appointments -->
    <div class="flex items-center justify-between bg-red-500 text-white p-6 rounded-xl shadow-lg hover:bg-gray-800 transition duration-300 w-full md:w-1/3">
      <div>
        <h3 class="text-4xl font-bold">{{ appointmentcount }}</h3>
        <h4 class="text-lg mt-2">Appointments For You</h4>
      </div>
      <div class="bg-white text-red-500 rounded-full p-4">
        <i class="fa fa-calendar text-3xl"></i>
      </div>
    </div>

    <!-- Patients Under You -->
    <div class="flex items-center justify-between bg-orange-500 text-white p-6 rounded-xl shadow-lg hover:bg-gray-800 transition duration-300 w-full md:w-1/3">
      <div>
        <h3 class="text-4xl font-bold">{{ patientcount }}</h3>
        <h4 class="text-lg mt-2">Patients Under You</h4>
      </div>
      <div class="bg-white text-orange-500 rounded-full p-4">
        <i class="fa fa-user-o text-3xl"></i>
      </div>
    </div>

    <!-- Patients Discharged -->
    <div class="flex items-center justify-between bg-blue-600 text-white p-6 rounded-xl shadow-lg hover:bg-gray-800 transition duration-300 w-full md:w-1/3">
      <div>
        <h3 class="text-4xl font-bold">{{ patientdischarged }}</h3>
        <h4 class="text-lg mt-2">Your Patients Discharged</h4>
      </div>
      <div class="bg-white text-blue-600 rounded-full p-4">
        <i class="fa fa-check-circle-o text-3xl"></i>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"></script>
</body>
</html>
