<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>

<body class="bg-gray-100">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-8">

    <!-- Doctor Card -->
    <div
      class="bg-red-500 text-white p-6 rounded-2xl shadow-lg flex items-center justify-between hover:bg-gray-800 transition duration-300"
    >
      <div>
        <h3 class="text-4xl font-bold">{{ doctorcount }}</h3>
        <h4 class="text-lg font-semibold">Total Doctors</h4>
        <p class="text-sm text-gray-100 mt-1">
          Approval Required: {{ pendingdoctorcount }}
        </p>
      </div>
      <div class="flex items-center justify-center bg-white rounded-full w-20 h-20">
        <i class="fa-solid fa-user-doctor text-red-500 text-4xl"></i>
      </div>
    </div>

    <!-- Patient Card -->
    <div
      class="bg-orange-500 text-white p-6 rounded-2xl shadow-lg flex items-center justify-between hover:bg-gray-800 transition duration-300"
    >
      <div>
        <h3 class="text-4xl font-bold">{{ patientcount }}</h3>
        <h4 class="text-lg font-semibold">Total Patients</h4>
        <p class="text-sm text-gray-100 mt-1">
          Wants to Admit: {{ pendingpatientcount }}
        </p>
      </div>
      <div class="flex items-center justify-center bg-white rounded-full w-20 h-20">
        <i class="fa-solid fa-user text-orange-500 text-4xl"></i>
      </div>
    </div>

    <!-- Appointment Card -->
    <div
      class="bg-blue-600 text-white p-6 rounded-2xl shadow-lg flex items-center justify-between hover:bg-gray-800 transition duration-300"
    >
      <div>
        <h3 class="text-4xl font-bold">{{ appointmentcount }}</h3>
        <h4 class="text-lg font-semibold">Total Appointments</h4>
        <p class="text-sm text-gray-100 mt-1">
          Approved Appointments: {{ pendingappointmentcount }}
        </p>
      </div>
      <div class="flex items-center justify-center bg-white rounded-full w-20 h-20">
        <i class="fa-solid fa-calendar text-blue-600 text-4xl"></i>
      </div>
    </div>

  </div>
</body>
</html>
