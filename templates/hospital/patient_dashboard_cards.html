<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Doctor Info</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .block-hover:hover {
      background-color: #3C3C3C;
      transition: all 0.5s;
    }

    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      line-height: 1;
    }
  </style>
</head>

<body class="bg-gray-100 p-6">

  <!-- First Row -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
    <div class="market-update-block bg-red-600 text-white rounded-lg shadow-md block-hover flex items-center p-4">
      <div class="flex-1">
        <h3 class="text-xl font-bold">{{ doctorName }}</h3>
        <h4 class="text-sm">Doctor Name</h4>
      </div>
      <div class="icon-circle text-green-600">
        <i class="fas fa-user"></i>
      </div>
    </div>

    <div class="market-update-block bg-green-800 text-white rounded-lg shadow-md block-hover flex items-center p-4">
      <div class="flex-1">
        <h3 class="text-xl font-bold">{{ symptoms }}</h3>
        <h4 class="text-sm">Symptoms</h4>
      </div>
      <div class="icon-circle text-orange-500">
        <i class="fas fa-info-circle"></i>
      </div>
    </div>

    <div class="market-update-block bg-blue-600 text-white rounded-lg shadow-md block-hover flex items-center p-4">
      <div class="flex-1">
        <h3 class="text-xl font-bold">{{ doctorMobile }}</h3>
        <h4 class="text-sm">Doctor Mobile</h4>
      </div>
      <div class="icon-circle text-blue-600">
        <i class="fas fa-mobile-alt"></i>
      </div>
    </div>
  </div>

  <!-- Second Row -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="market-update-block bg-red-600 text-white rounded-lg shadow-md block-hover flex items-center p-4">
      <div class="flex-1">
        <h3 class="text-xl font-bold">{{ doctorAddress }}</h3>
        <h4 class="text-sm">Doctor Address</h4>
      </div>
      <div class="icon-circle text-green-600">
        <i class="fas fa-map-marker-alt"></i>
      </div>
    </div>

    <div class="market-update-block bg-green-800 text-white rounded-lg shadow-md block-hover flex items-center p-4">
      <div class="flex-1">
        <h3 class="text-xl font-bold">{{ doctorDepartment }}</h3>
        <h4 class="text-sm">Doctor Department</h4>
      </div>
      <div class="icon-circle text-orange-500">
        <i class="fas fa-list-alt"></i>
      </div>
    </div>

    <div class="market-update-block bg-blue-600 text-white rounded-lg shadow-md block-hover flex items-center p-4">
      <div class="flex-1">
        <h3 class="text-xl font-bold">{{ admitDate }}</h3>
        <h4 class="text-sm">Admit Date</h4>
      </div>
      <div class="icon-circle text-blue-600">
        <i class="fas fa-calendar-alt"></i>
      </div>
    </div>
  </div>

</body>

</html>
