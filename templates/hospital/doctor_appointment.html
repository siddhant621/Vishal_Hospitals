{% extends 'hospital/doctor_base.html' %}
{% load static %}
{% block content %}

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Doctor Dashboard</title>
</head>

<div class="min-h-screen bg-gradient-to-br from-blue-100 via-indigo-100 to-green-100 flex flex-col items-center justify-center py-12 px-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
    
    <!-- View Appointment Card -->
    <a href="/doctor-view-appointment" class="block transform transition hover:scale-105">
      <div class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-2xl shadow-lg p-8 flex flex-col justify-between h-48">
        <div>
          <h2 class="text-2xl font-semibold">View Your Appointments</h2>
        </div>
        <div class="flex justify-end items-center mt-4">
          <i class="fas fa-calendar text-4xl opacity-80"></i>
        </div>
      </div>
    </a>

    <!-- Delete Appointment Card -->
    <a href="/doctor-delete-appointment" class="block transform transition hover:scale-105">
      <div class="bg-gradient-to-r from-green-400 to-teal-500 text-white rounded-2xl shadow-lg p-8 flex flex-col justify-between h-48">
        <div>
          <h2 class="text-2xl font-semibold">Delete Appointment</h2>
        </div>
        <div class="flex justify-end items-center mt-4">
          <i class="fas fa-trash-alt text-4xl opacity-80"></i>
        </div>
      </div>
    </a>

  </div>
</div>

{% endblock content %}
