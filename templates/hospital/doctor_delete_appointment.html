{% extends 'hospital/doctor_base.html' %}
{% block content %}
{% load static %}

<div class="max-w-5xl mx-auto mt-20 px-4">
  <div class="bg-white shadow-lg rounded-lg border border-gray-200">
    <div class="bg-red-600 text-white text-center py-3 rounded-t-lg">
      <h6 class="text-lg font-semibold tracking-wide">Delete Your Appointments</h6>
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700 uppercase">Patient Name</th>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700 uppercase">Picture</th>
            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700 uppercase">Description</th>
            <th class="px-6 py-3 text-center text-sm font-semibold text-gray-700 uppercase">Delete</th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-gray-200">
          {% for a,p in appointments %}
          <tr class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 text-gray-800 font-medium">{{ a.patientName }}</td>
            <td class="px-6 py-4">
              <img src="{% static p.profile_pic.url %}" alt="Profile Pic" class="h-10 w-10 rounded-full object-cover border border-gray-300">
            </td>
            <td class="px-6 py-4 text-gray-700">{{ a.description }}</td>
            <td class="px-6 py-4 text-center">
              <a href="{% url 'delete-appointment' a.id %}"
                 class="bg-red-500 hover:bg-red-600 text-white font-semibold px-3 py-2 rounded transition">
                 Delete
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% endblock content %}
