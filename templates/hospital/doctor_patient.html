{% extends 'hospital/doctor_base.html' %}
{% load static %}
{% block content %}

<div class="max-w-6xl mx-auto mt-16 px-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <!-- Patient Record Card -->
    <div class="bg-gradient-to-r from-blue-500 to-blue-400 rounded-xl shadow-md text-white p-8 transition-transform transform hover:scale-105">
      <a href="/doctor-view-patient" class="block">
        <h6 class="text-xl font-semibold mb-4">Your Patient Record</h6>
      </a>
      <div class="flex justify-end">
        <i class="fa-solid fa-user-injured text-4xl opacity-90"></i>
      </div>
    </div>

    <!-- Discharged Patient Card -->
    <div class="bg-gradient-to-r from-pink-500 to-pink-400 rounded-xl shadow-md text-white p-8 transition-transform transform hover:scale-105">
      <a href="/doctor-view-discharge-patient" class="block">
        <h6 class="text-xl font-semibold mb-4">Your Discharged Patient</h6>
      </a>
      <div class="flex justify-end">
        <i class="fa-solid fa-eject text-4xl opacity-90"></i>
      </div>
    </div>

  </div>
</div>

{% endblock content %}
